services:
  postgres:
    image: postgres:16-alpine
    container_name: vgp-postgres
    environment:
      POSTGRES_DB: vgp
      POSTGRES_USER: vgp
      POSTGRES_PASSWORD: vgp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - vgp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vgp -d vgp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  vgp-postgres-data:

